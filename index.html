<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Power BI Report Embed</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }
  h2 {
    margin-bottom: 12px;
    color: #222;
  }
  .report-container {
    width: 100%;
    max-width: 1140px;
    margin: 0 auto;
  }
  /* Power BI's standard published aspect ratio is roughly 16:9.
     This wrapper keeps that ratio responsive at any screen width. */
  .report-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 */
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .report-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

  <div class="report-container">
    <h2>Power BI Report</h2>
    <div class="report-wrapper">
      <iframe
        title="Power BI Report"
        src="https://app.powerbi.com/view?r=eyJrIjoiNDNjYWJhMmQtNWFkNi00MWJhLWIxY2ItMGExZDJmN2JhODBhIiwidCI6ImFlODliZTA5LWMyNzEtNGZmYi04MzU3LWM0NDQxOGE3MWRkYyJ9"
        allowFullScreen="true">
      </iframe>
    </div>
  </div>

</body>
</html>
