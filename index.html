<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tara Bala Weekly Calendar</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #fff;
    color: #222;
    padding: 16px;
  }

  .controls {
    display: flex;
    gap: 40px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .control-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 4px;
  }
  .control-group select {
    padding: 6px 10px;
    font-size: 14px;
    min-width: 140px;
  }

  .legend {
    float: right;
    border: 1px solid #ccc;
    width: 160px;
    margin-bottom: 10px;
  }
  .legend div {
    padding: 4px 10px;
    font-size: 13px;
    color: #fff;
    font-weight: bold;
  }
  .legend .avoid       { background: #e02424; }
  .legend .challenging { background: #c8801a; }
  .legend .excellent   { background: #1faa3c; }
  .legend .good        { background: #b6f0b6; color: #1a5c1a; }
  .legend .neutral     { background: #fdf6c0; color: #6b6320; }

  table.calendar {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
    clear: both;
  }
  table.calendar th, table.calendar td {
    border: 1px solid #999;
    vertical-align: top;
    padding: 6px 8px;
    font-size: 13px;
  }
  table.calendar th {
    background: #f2f2f2;
    text-align: left;
  }
  .week-col {
    width: 50px;
    background: #f2f2f2;
    font-weight: bold;
    text-align: center;
  }
  .day-cell .date {
    font-weight: bold;
    display: block;
  }
  .day-cell .nakshatra {
    display: block;
  }
  .day-cell .pct {
    display: block;
    font-size: 12px;
  }

  /* tara bala tiers */
  .avoid       { background: #e02424; color: #fff; }
  .challenging { background: #c8801a; color: #fff; }
  .excellent   { background: #1faa3c; color: #fff; }
  .good        { background: #b6f0b6; color: #1a5c1a; }
  .neutral     { background: #fdf6c0; color: #6b6320; }
  .empty       { background: #fff; }
</style>
</head>
<body>

  <div class="controls">
    <div class="control-group">
      <label for="rashi">Rashi</label>
      <select id="rashi">
        <option>Aries</option>
        <option>Taurus</option>
        <option>Gemini</option>
        <option>Cancer</option>
        <option>Leo</option>
        <option>Virgo</option>
        <option>Libra</option>
        <option>Scorpio</option>
        <option>Sagittarius</option>
        <option>Capricorn</option>
        <option>Aquarius</option>
        <option>Pisces</option>
      </select>
    </div>
    <div class="control-group">
      <label for="janamNakshatra">Janam Nakshatra</label>
      <select id="janamNakshatra">
        <option>Ashwini</option>
        <option>Bharani</option>
        <option>Krittika</option>
        <option>Rohini</option>
        <option>Mrigashirsha</option>
      </select>
    </div>
  </div>

  <div class="legend">
    <div class="avoid">Avoid</div>
    <div class="challenging">Challenging</div>
    <div class="excellent">Excellent</div>
    <div class="good">Good</div>
    <div class="neutral">Neutral</div>
  </div>

  <table class="calendar">
    <thead>
      <tr>
        <th class="week-col">Week</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
        <th>Saturday</th>
        <th>Sunday</th>
      </tr>
    </thead>
    <tbody id="calendarBody">
      <!-- rows injected by JS -->
    </tbody>
  </table>

// Fallback: any Rashi/Nakshatra combo not explicitly listed above reuses the
// Aries|Ashwini dataset so the demo never shows a blank grid. Swap this whole
// function for a real fetch() against your API when ready.
function getDataFor(rashi, janamNakshatra) {
  var key = rashi + '|' + janamNakshatra;
  return datasets[key] || datasets['Aries|Ashwini'];
}

function renderCalendar(data) {
  var body = document.getElementById('calendarBody');
  body.innerHTML = '';

  data.forEach(function (weekRow) {
    var tr = document.createElement('tr');

    var weekTd = document.createElement('td');
    weekTd.className = 'week-col';
    weekTd.textContent = weekRow.week;
    tr.appendChild(weekTd);

    weekRow.days.forEach(function (day) {
      var td = document.createElement('td');
      td.className = 'day-cell';

      if (day) {
        td.classList.add(day.tier);
        td.innerHTML =
          '<span class="date">' + day.date + '</span>' +
          '<span class="nakshatra">' + day.nakshatra + '</span>' +
          '<span class="pct">(' + day.pct.toFixed(2) + '%)</span>';
      } else {
        td.classList.add('empty');
      }

      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

renderCalendar(getDataFor(document.getElementById('rashi').value, document.getElementById('janamNakshatra').value));

function refreshCalendar() {
  var rashi = document.getElementById('rashi').value;
  var janamNakshatra = document.getElementById('janamNakshatra').value;
  renderCalendar(getDataFor(rashi, janamNakshatra));

</html>
